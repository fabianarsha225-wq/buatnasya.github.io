<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Untuk Kamu 💙</title>

  <style>
    body {
      margin: 0;
      font-family: "Arial", sans-serif;
      background: linear-gradient(135deg, #a8edea, #fed6e3);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .card {
      background: rgba(255,255,255,0.8);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      max-width: 500px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      animation: fadeIn 2s ease;
    }

    h1 {
      margin-bottom: 10px;
      color: #333;
    }

    p {
      color: #555;
      line-height: 1.6;
    }

    .btn {
      margin-top: 20px;
      display: inline-block;
      padding: 12px 20px;
      background: #ff7eb3;
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
      background: #ff4f91;
    }

    .heart {
      font-size: 50px;
      animation: heartbeat 1.2s infinite;
      margin-bottom: 10px;
    }

    @keyframes heartbeat {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .floating {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }

    .floating span {
      position: absolute;
      color: rgba(255,255,255,0.7);
      font-size: 20px;
      animation: floatUp 6s linear infinite;
    }

    @keyframes floatUp {
      from {
        transform: translateY(100vh);
        opacity: 0;
      }
      to {
        transform: translateY(-10vh);
        opacity: 1;
      }
    }
  </style>
</head>

<body>

  <div class="floating">
    <span style="left:10%">💖</span>
    <span style="left:30%">💙</span>
    <span style="left:50%">💖</span>
    <span style="left:70%">💙</span>
    <span style="left:90%">💖</span>
  </div>

  <div class="card">
    <div class="heart">💙</div>
    <h1>Hey Kamu...</h1>
    <p>
      Aku tahu hari ini mungkin berat buat kamu.<br><br>
      Tapi kamu tidak sendiri. Aku selalu di sini, mendukung kamu, 
      dan percaya kamu bisa melewati semuanya.<br><br>
      Kamu jauh lebih kuat dari yang kamu kira 💙
    </p>

    <a class="btn" onclick="showMessage()">Klik kalau kamu butuh senyum 😊</a>

    <p id="msg" style="margin-top:20px; font-weight:bold;"></p>
  </div>

  <script>
    function showMessage() {
      document.getElementById("msg").innerHTML =
        "Aku sayang kamu. Jangan sedih lagi ya 💙 Kamu berharga banget ✨";
    }
  </script>

</body>
</html>
